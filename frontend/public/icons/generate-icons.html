<!DOCTYPE html>
<html>
<head><title>Icon Generator</title></head>
<body>
<p>Open browser console and run the script to generate PNG icons, or use a tool like Inkscape/ImageMagick to convert favicon.svg to icon-192.png and icon-512.png</p>
<canvas id="c192" width="192" height="192"></canvas>
<canvas id="c512" width="512" height="512"></canvas>
<script>
function drawIcon(canvas, size) {
  const ctx = canvas.getContext('2d');
  const r = size * 0.22;

  // Background
  ctx.beginPath();
  ctx.moveTo(r, 0);
  ctx.lineTo(size - r, 0);
  ctx.quadraticCurveTo(size, 0, size, r);
  ctx.lineTo(size, size - r);
  ctx.quadraticCurveTo(size, size, size - r, size);
  ctx.lineTo(r, size);
  ctx.quadraticCurveTo(0, size, 0, size - r);
  ctx.lineTo(0, r);
  ctx.quadraticCurveTo(0, 0, r, 0);
  ctx.closePath();
  ctx.fillStyle = '#E8825A';
  ctx.fill();

  // Lines (like a notepad)
  ctx.strokeStyle = 'white';
  ctx.lineWidth = size * 0.063;
  ctx.lineCap = 'round';

  const lx1 = size * 0.31, lx2 = size * 0.69;
  ctx.beginPath(); ctx.moveTo(lx1, size*0.34); ctx.lineTo(lx2, size*0.34); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(lx1, size*0.5); ctx.lineTo(lx2, size*0.5); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(lx1, size*0.66); ctx.lineTo(size*0.5, size*0.66); ctx.stroke();

  // Checkmark circle (bottom right)
  ctx.beginPath();
  ctx.arc(size*0.72, size*0.66, size*0.14, 0, Math.PI*2);
  ctx.fillStyle = '#F5A623';
  ctx.fill();

  ctx.strokeStyle = 'white';
  ctx.lineWidth = size * 0.04;
  ctx.beginPath();
  ctx.moveTo(size*0.67, size*0.66);
  ctx.lineTo(size*0.71, size*0.70);
  ctx.lineTo(size*0.78, size*0.62);
  ctx.stroke();

  return canvas.toDataURL('image/png');
}

const c192 = document.getElementById('c192');
const c512 = document.getElementById('c512');
drawIcon(c192, 192);
drawIcon(c512, 512);

// Download links
[c192, c512].forEach((canvas, i) => {
  const a = document.createElement('a');
  a.href = canvas.toDataURL('image/png');
  a.download = i === 0 ? 'icon-192.png' : 'icon-512.png';
  a.textContent = `Download ${i === 0 ? '192x192' : '512x512'}`;
  a.style.display = 'block';
  document.body.appendChild(a);
});
</script>
</body>
</html>
